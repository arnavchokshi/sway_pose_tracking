SWAY_ST_THETA_IOU: "0.3"
SWAY_ST_THETA_EMB: "0.375"
SWAY_ST_EMA_ALPHA: "0.91"

SWAY_STITCH_MAX_FRAME_GAP: "110"
SWAY_STITCH_RADIUS_BBOX_FRAC: "0.55"
