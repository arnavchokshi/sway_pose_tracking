# SWAY_DETECT_SIZE→640, SWAY_HYBRID_SAM_ROI_PAD_FRAC→0.1) unless you export
# SWAY_UNLOCK_DETECTION_TUNING=1 / SWAY_UNLOCK_HYBRID_SAM_TUNING=1 — same order as Lambda sweep children.

SWAY_USE_BOXMOT: "1"
