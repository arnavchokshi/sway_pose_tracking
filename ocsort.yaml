# Sway Pose V3.0 — occlusion-tolerant tracker config (loaded first if present)
# track_buffer MUST be >= crossover.REID_MAX_FRAME_GAP (90). Phase 5 Re-ID stitches fragments
# within 90 frames; BoT-SORT must retain lost tracks that long or Re-ID starves.

tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.45
track_buffer: 90
match_thresh: 0.6
fuse_score: True

gmc_method: sparseOptFlow
proximity_thresh: 0.5
appearance_thresh: 0.8
with_reid: False
model: auto
