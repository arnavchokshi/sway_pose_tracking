# Sway Pose V3.0 — occlusion-tolerant tracker config
# V3.9: track_buffer MUST be >= REID_MAX_FRAME_GAP (90). Phase 5 (apply_occlusion_reid) stitches
# dead→newborn tracks within 90 frames. If BoT-SORT deletes lost tracks at 30 frames, Re-ID starves.

tracker_type: botsort
track_high_thresh: 0.40
track_low_thresh: 0.1
new_track_thresh: 0.50
min_hits: 3  # V3.1: Track must be detected in 3 consecutive frames to become confirmed
track_buffer: 90  # Align with crossover.REID_MAX_FRAME_GAP; must retain lost tracks for Re-ID
match_thresh: 0.7  # Slightly lower for Kalman drift during occlusion gaps
fuse_score: True

gmc_method: sparseOptFlow
proximity_thresh: 0.5
appearance_thresh: 0.5  # V3.8: Min similarity for Re-ID match; 0.5 rejects red↔blue during occlusion
with_reid: True   # V3.8: Appearance-based tracking; prevents red/blue ID swap during occlusion
model: auto
